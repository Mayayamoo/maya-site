</head>
<body>
    <div id="timeline-loading-overlay">
        <div class="loading-content">
            <div class="loading-title">Loading Timeline...</div>
            <div class="loading-spinner"></div>
        </div>
    </div>
    <div class="background-pattern"></div>
    <!-- Loading overlay -->
    <button class="menu-toggle">☰</button>
    <nav>
		<h1><a href= "base.html">Maya Luna</a></h1>
		<ul>
			<li><a href="about.html">About</a></li>
			<li><a href="https://progressivebeacon.substack.com/">Blog</a></li>
			<li><a href="endeavours.html">Endeavours</a></li>
			<li><a href="https://x.com/envisionedluna">Twitter</a></li>
			<li><a href="https://www.guidedtrack.com/programs/lcf9n8s/run">Date me</menu></a></li>
			<li><a href="arts.html">Movies, Music and Art</a></li>
			<li><a href="https://throne.com/mayaluna">Check Out My Wishlist</a></li>
			<li><a href="discord.html">Discord</a></li>
			<li><a href="contact.html">Contact</a></li>
		</ul>
    </nav>
    <!-- Main Content -->

    <div class="main-content">
        <h1 class="title-glow">My Hijinks</h1>
        <p class="subtitle">explore the depths of the Mayanomicon™</p>
        
        <div class="timeline-navigation">
            <button class="timeline-nav-btn" data-direction="prev" hidden><i class="fas fa-chevron-left"></i></button>
            <div class="timeline-progress-container">
                <div class="timeline-progress-bar"></div>
            </div>
            <button class="timeline-nav-btn" data-direction="next" hidden><i class="fas fa-chevron-right"></i></button>
        </div>
        
        <div class="timeline-container">
            <div class="timeline-path">
                <svg class="timeline-svg" viewBox="0 0 1000 1400" width="1000" height="1400" preserveAspectRatio="none">
                    <!-- Path will be generated by JavaScript -->
                    <path id="timeline-curve" class="timeline-line" d="" fill="none" stroke="#ff3264" stroke-width="4" stroke-dasharray="15,10" />
                    <!-- Animated particle along the path -->
                    <circle id="path-particle" r="6" fill="#ffff00">
                        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>
            <!-- Timeline dots and nodes will be generated by JavaScript -->
        </div>

        <!-- Timeline Minimap -->
        <div class="timeline-minimap-container">
            <svg class="timeline-minimap-svg" viewBox="0 0 1000 1400" width="120" height="168">
                <path id="minimap-curve" class="minimap-line" d="" fill="none" stroke="#ff3264" stroke-width="2" stroke-dasharray="6,4" />
                <!-- Dots and viewport box will be rendered by JS -->
            </svg>
        </div>
    </div>

    <div class="overlay"></div>

    <script src="js/work.js"></script>
    <script src="js/navtoggle.js"></script>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
    </style>
</body>
</html>
